# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]  # Test on multiple Python versions

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4  # Upgraded to v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov pytest-flask pytest-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check for test files
      id: check_tests
      run: |
        if [ -d "tests" ] && [ "$(ls -A tests/)" ]; then
          echo "has_tests=true" >> $GITHUB_OUTPUT
          echo "Test directory found with files"
        else
          echo "has_tests=false" >> $GITHUB_OUTPUT
          echo "No test files found - creating basic test"
          mkdir -p tests
          cat > tests/test_simple.py << 'EOF'
def test_imports():
    """Simple test to verify imports work"""
    try:
        from flask import Flask
        from models.user import User
        from models.health_models import CommunityHealthWorker
        assert True
    except ImportError as e:
        assert False, f"Import failed: {e}"

def test_app_creation():
    """Test that app can be created"""
    try:
        from app_crud import app
        assert app is not None
    except Exception as e:
        assert False, f"App creation failed: {e}"
EOF
          echo "Created basic test file"
        fi
    
    - name: Test with pytest
      run: |
        if [ -d "tests" ] && [ "$(ls -A tests/)" ]; then
          # Run tests with coverage
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term --cov-fail-under=50
        else
          echo "No tests found - skipping test step"
          # Create and run a minimal test to verify setup
          python -c "print('Python environment is working')"
          python -c "import flask; print(f'Flask version: {flask.__version__}')"
        fi
    
    - name: Upload coverage to Codecov
      if: steps.check_tests.outputs.has_tests == 'true'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}
        fail_ci_if_error: false
    
    - name: Run additional health checks
      run: |
        echo "🔍 Running application health checks..."
        
        # Check if main app file exists
        if [ -f "app_crud.py" ]; then
          echo "✅ Main app file found"
        else
          echo "⚠️ Main app file not found - checking for app.py"
          if [ -f "app.py" ]; then
            echo "✅ app.py found"
          else
            echo "❌ No main application file found"
            exit 1
          fi
        fi
        
        # Check for critical imports
        python -c "
import sys
critical_modules = ['flask', 'flask_jwt_extended', 'strawberry']
missing = []
for module in critical_modules:
    try:
        __import__(module)
        print(f'✅ {module} available')
    except ImportError:
        missing.append(module)
if missing:
    print(f'❌ Missing modules: {missing}')
    sys.exit(1)
"
    
    - name: Validate requirements
      run: |
        echo "📦 Validating requirements.txt..."
        if [ -f "requirements.txt" ]; then
          # Check for essential packages
          grep -q "flask" requirements.txt && echo "✅ Flask found" || echo "⚠️ Flask not in requirements"
          grep -q "flask-jwt-extended" requirements.txt && echo "✅ JWT found" || echo "⚠️ JWT not in requirements"
          grep -q "pytest" requirements.txt && echo "✅ pytest found" || echo "⚠️ pytest not in requirements (add for testing)"
        else
          echo "❌ requirements.txt not found"
          exit 1
        fi

  deploy-ready:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Deployment Ready Check
        run: |
          echo "✅ All tests passed and linting successful!"
          echo "🚀 Application is ready for deployment to production"
          echo ""
          echo "📊 Summary:"
          echo "   - Code passed linting checks"
          echo "   - Tests completed successfully" 
          echo "   - Dependencies validated"
          echo "   - Python environment verified"
